<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Click Speed Pro</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0b0b;
  color:white;
  overflow:hidden;
}

/* CENTER PANEL */
.panel {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:320px;
  text-align:center;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:16px;
  padding:30px;
  backdrop-filter:blur(10px);
}

/* BUTTONS */
button {
  padding:12px 18px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00ff99;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  transform:scale(1.05);
}

/* BIG CLICK AREA */
#clickZone {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* TEXT */
h1,h2,p {
  margin:8px 0;
}
</style>
</head>

<body>

<div class="panel">
  <h1>Click Speed Test</h1>
  <p>Click anywhere after start</p>

  <button id="startBtn">Start Game</button>

  <h2 id="time">Time: 5</h2>
  <h2 id="score">Clicks: 0</h2>
  <p id="status">Ready</p>
</div>

<div id="clickZone"></div>

<script>
let time = 5;
let clicks = 0;
let running = false;
let timer = null;

const startBtn = document.getElementById("startBtn");
const timeEl = document.getElementById("time");
const scoreEl = document.getElementById("score");
const statusEl = document.getElementById("status");
const clickZone = document.getElementById("clickZone");

/* START GAME */
startBtn.onclick = () => {
  time = 5;
  clicks = 0;
  running = true;

  timeEl.textContent = "Time: " + time;
  scoreEl.textContent = "Clicks: " + clicks;
  statusEl.textContent = "GO!";

  clearInterval(timer);

  timer = setInterval(() => {
    time--;
    timeEl.textContent = "Time: " + time;

    if (time <= 0) {
      endGame();
    }
  }, 1000);
};

/* CLICK SYSTEM */
clickZone.addEventListener("click", () => {
  if (!running) return;

  clicks++;
  scoreEl.textContent = "Clicks: " + clicks;
});

/* END GAME */
function endGame() {
  running = false;
  clearInterval(timer);

  statusEl.textContent = "Finished";

  document.querySelector(".panel").innerHTML = `
    <h1>Game Over</h1>
    <h2>Your Score: ${clicks}</h2>
    <p>Clicks per second: ${(clicks / 5).toFixed(2)}</p>
    <button onclick="location.reload()">Play Again</button>
  `;
}
</script>

</body>
</html>

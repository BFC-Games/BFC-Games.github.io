<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Click Speed Pro</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
  overflow:hidden;
}

/* CENTER UI */
#ui {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  background:rgba(255,255,255,0.06);
  padding:40px;
  border-radius:18px;
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.12);
  width:300px;
}

/* BUTTON */
button {
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#00ff99;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:scale(1.05);
}

/* CLICK AREA */
#clickArea {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* TEXT */
h1,h2,p {
  margin:10px 0;
}
</style>
</head>

<body>

<div id="ui">
  <h1>Click Speed</h1>
  <p>Click as fast as possible in 5 seconds</p>

  <button id="startBtn">Start</button>

  <h2 id="timer">5</h2>
  <h2 id="score">0</h2>
</div>

<div id="clickArea"></div>

<script>
let time = 5;
let score = 0;
let running = false;
let interval;

const startBtn = document.getElementById("startBtn");
const timerText = document.getElementById("timer");
const scoreText = document.getElementById("score");
const clickArea = document.getElementById("clickArea");

startBtn.onclick = startGame;

function startGame(){
  time = 5;
  score = 0;
  running = true;

  timerText.innerText = time;
  scoreText.innerText = score;

  clearInterval(interval);

  interval = setInterval(()=>{
    time--;
    timerText.innerText = time;

    if(time <= 0){
      endGame();
    }
  },1000);
}

clickArea.addEventListener("click", ()=>{
  if(running){
    score++;
    scoreText.innerText = score;
  }
});

function endGame(){
  running = false;
  clearInterval(interval);

  document.getElementById("ui").innerHTML = `
    <h1>Time Up</h1>
    <h2>Score: ${score}</h2>
    <button onclick="location.reload()">Restart</button>
  `;
}
</script>

</body>
</html>
